name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (renderer + main)
        run: npm run build

      - name: Package Electron (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux AppImage --publish never

      - name: Package Electron (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win nsis portable --publish never

      - name: Package Electron (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac dmg --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trading-pro-${{ matrix.os }}
          path: |
            release/*.AppImage
            release/*.exe
            release/*.dmg
            release/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
